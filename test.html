<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B&B Diagnostics</title>
<script src="config.js"></script>
<script src="breath.js"></script>
<script src="sound.js"></script>
<script src="claude.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0D0D0D; color: #F0EAD6; font-family: 'DM Sans', system-ui, sans-serif;
         padding: 30px 20px; font-size: 14px; line-height: 1.6; }
  h1 { font-size: 18px; color: #C9A84C; margin-bottom: 4px; }
  .sub { font-size: 11px; color: #8A7E6A; margin-bottom: 24px; }
  .suite { background: #161616; border: 1px solid #3A3530; border-radius: 12px;
           padding: 18px 20px; margin-bottom: 14px; }
  .suite-title { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
                 color: #C9A84C; margin-bottom: 12px; }
  .test { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .badge { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .test-name { font-size: 13px; flex: 1; }
  .test-detail { font-size: 11px; color: #8A7E6A; margin-top: 2px; }
  .fail .test-name { color: #E07070; }
  .fail .badge::before { content: '❌'; }
  .pass .badge::before { content: '✅'; }
  .warn .badge::before { content: '⚠️'; }
  .warn .test-name { color: #C9A84C; }
  .pending .badge::before { content: '⏳'; }
  .summary { background: #1E1A14; border: 1px solid rgba(201,168,76,0.3);
             border-radius: 10px; padding: 16px 20px; margin-top: 20px;
             text-align: center; font-size: 14px; }
  .summary .big { font-size: 28px; font-weight: 300; color: #C9A84C; }
  .run-btn { margin-top: 20px; width: 100%; padding: 13px;
             background: #C9A84C; color: #0D0D0D; border: none;
             border-radius: 10px; font-size: 14px; font-weight: 500;
             cursor: pointer; letter-spacing: 0.04em; }
  .run-btn:hover { opacity: 0.88; }
</style>
</head>
<body>
<h1>Boardrooms &amp; Breathwork — Diagnostics</h1>
<div class="sub">Self-running test suite. Open this page to verify all critical paths.</div>

<div id="results"></div>
<div id="summary"></div>
<button class="run-btn" onclick="runAll()">▶ Run All Tests</button>

<script>
// ── Test runner
const suites = [];
let passed = 0, failed = 0, warned = 0;

function suite(name, tests) { suites.push({ name, tests }); }
function render() {
  passed = 0; failed = 0; warned = 0;
  let html = '';
  suites.forEach(s => {
    html += `<div class="suite"><div class="suite-title">${s.name}</div>`;
    s.tests.forEach(t => {
      let status = 'pass', detail = '';
      try {
        const result = t.fn();
        if (result === false) { status = 'fail'; }
        else if (typeof result === 'string') { status = 'warn'; detail = result; }
        else if (typeof result === 'object' && result !== null) {
          status = result.status || 'pass';
          detail = result.detail || '';
        }
      } catch(e) { status = 'fail'; detail = e.message; }
      if (status === 'pass') passed++;
      else if (status === 'fail') failed++;
      else if (status === 'warn') warned++;
      html += `<div class="test ${status}">
        <span class="badge"></span>
        <div><div class="test-name">${t.name}</div>
        ${detail ? `<div class="test-detail">${detail}</div>` : ''}</div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('results').innerHTML = html;
  const total = passed + failed + warned;
  const color = failed > 0 ? '#E07070' : warned > 0 ? '#C9A84C' : '#6BAF87';
  document.getElementById('summary').innerHTML = `
    <div class="summary">
      <div class="big" style="color:${color}">${passed}/${total}</div>
      <div style="margin-top:4px;color:#8A7E6A;">${passed} passed · ${warned} warnings · ${failed} failed</div>
    </div>`;
}

// ══ SUITE 1: Config
suite('Config', [
  { name: 'CONFIG object exists', fn: () => typeof CONFIG === 'object' && CONFIG !== null },
  { name: 'facilitatorName set', fn: () => CONFIG.facilitatorName?.length > 0 },
  { name: 'initiativeName set', fn: () => CONFIG.initiativeName?.length > 0 },
  { name: 'facilitatorSite is valid URL', fn: () => CONFIG.facilitatorSite?.startsWith('http') },
  { name: 'communityPhone set', fn: () => CONFIG.communityPhone?.length > 0 },
  { name: 'colors object has accent', fn: () => CONFIG.colors?.accent?.startsWith('#') },
]);

// ══ SUITE 2: Breath data
suite('Breath Sequences', [
  { name: 'SEQUENCES has box, 478, nidra keys', fn: () =>
      ['box','478','nidra'].every(k => Array.isArray(SEQUENCES[k])) },
  { name: 'SEQUENCES_SENIOR has box, 478, nidra keys', fn: () =>
      ['box','478','nidra'].every(k => Array.isArray(SEQUENCES_SENIOR[k])) },
  { name: 'Box sequence has 4 steps', fn: () => SEQUENCES.box.length === 4 },
  { name: '4-7-8 sequence has 3 steps', fn: () => SEQUENCES['478'].length === 3 },
  { name: 'Nidra sequence has 5 steps', fn: () => SEQUENCES.nidra.length === 5 },
  { name: '4-7-8 counts are 4,7,8', fn: () => {
      const s = SEQUENCES['478'];
      return s[0].c === 4 && s[1].c === 7 && s[2].c === 8;
  }},
  { name: 'Senior 4-7-8 hold is shorter than standard', fn: () =>
      SEQUENCES_SENIOR['478'][1].c < SEQUENCES['478'][1].c },
  { name: 'TECH_DESCS has all 3 keys', fn: () =>
      ['box','478','nidra'].every(k => typeof TECH_DESCS[k] === 'string' && TECH_DESCS[k].length > 0) },
  { name: '4-7-8 desc does NOT contain "nidra"', fn: () =>
      !TECH_DESCS['478'].toLowerCase().includes('nidra') },
  { name: 'Box desc does NOT contain "nidra"', fn: () =>
      !TECH_DESCS['box'].toLowerCase().includes('nidra') },
  { name: 'TOTAL_ROUNDS correct', fn: () =>
      TOTAL_ROUNDS.box === 4 && TOTAL_ROUNDS['478'] === 4 && TOTAL_ROUNDS.nidra === 3 },
  { name: 'STRESS_LABELS has all 4 keys', fn: () =>
      ['regulated','mild','high','crisis'].every(k => typeof STRESS_LABELS[k] === 'string') },
  { name: 'TECH_FULL has all 3 keys', fn: () =>
      ['box','478','nidra'].every(k => typeof TECH_FULL[k] === 'string') },
]);

// ══ SUITE 3: Sound module
suite('Sound Module', [
  { name: 'BOWL_DURATION_SECS is 60', fn: () => BOWL_DURATION_SECS === 60 },
  { name: 'BOWL_FREQ_HZ is a number > 0', fn: () => typeof BOWL_FREQ_HZ === 'number' && BOWL_FREQ_HZ > 0 },
  { name: 'runSoundBowl is a function', fn: () => typeof runSoundBowl === 'function' },
  { name: 'Web Audio API available', fn: () => {
      const ok = !!(window.AudioContext || window.webkitAudioContext);
      return ok ? true : { status: 'warn', detail: 'AudioContext not available — silent fallback will run' };
  }},
]);

// ══ SUITE 4: Claude module
suite('Claude Module', [
  { name: 'CLAUDE_MODEL is correct string', fn: () =>
      CLAUDE_MODEL === 'claude-sonnet-4-20250514' },
  { name: 'API_ENDPOINT is correct', fn: () =>
      API_ENDPOINT === 'https://api.anthropic.com/v1/messages' },
  { name: 'buildPrompt returns a string', fn: () => {
      const p = buildPrompt({ name:'Test', age:'30s', stress:'mild', tech:'box' });
      return typeof p === 'string' && p.length > 100;
  }},
  { name: 'buildPrompt includes facilitator name', fn: () =>
      buildPrompt({ name:'Test', age:'30s', stress:'mild', tech:'box' })
        .includes(CONFIG.facilitatorName) },
  { name: 'buildPrompt includes correct technique name', fn: () => {
      const p478   = buildPrompt({ name:'Test', age:'30s', stress:'mild', tech:'478' });
      const pNidra = buildPrompt({ name:'Test', age:'30s', stress:'mild', tech:'nidra' });
      const pBox   = buildPrompt({ name:'Test', age:'30s', stress:'mild', tech:'box' });
      const ok = p478.includes('4-7-8') && pNidra.includes('Nidra') && pBox.includes('Box');
      return ok ? true : { status: 'fail', detail: 'Technique names not matching in prompt' };
  }},
  { name: 'downloadPrescription is a function', fn: () => typeof downloadPrescription === 'function' },
  { name: 'fallbackPrescription includes user name', fn: () =>
      fallbackPrescription('Maria').includes('Maria') },
  { name: 'fetchPrescription is async function', fn: () =>
      typeof fetchPrescription === 'function' },
  { name: 'startLoadingMessages is a function', fn: () =>
      typeof startLoadingMessages === 'function' },
]);

// ══ SUITE 5: Live API smoke test (async — runs separately)
suite('Live API (async)', [
  { name: 'Anthropic API reachable', fn: () =>
      ({ status: 'warn', detail: 'Click "Run API Test" below to test live call' }) },
]);

function runAll() { render(); }

// Auto-run on load
window.addEventListener('DOMContentLoaded', runAll);
</script>

<button class="run-btn" style="margin-top:10px;background:transparent;border:1px solid #3A3530;color:#8A7E6A;"
  onclick="runApiTest(this)">
  🌐 Run Live API Test (calls Anthropic)
</button>

<div id="apiResult" style="margin-top:14px;"></div>

<script>
async function runApiTest(btn) {
  btn.textContent = 'Testing…';
  btn.disabled = true;
  const el = document.getElementById('apiResult');
  el.innerHTML = '<div style="color:#8A7E6A;font-size:13px;">Calling Anthropic API…</div>';
  try {
    const text = await fetchPrescription({
      name: 'TestUser', age: '30s', stress: 'mild', tech: 'box'
    });
    const ok = text && text.length > 50;
    el.innerHTML = ok
      ? `<div style="background:#161616;border:1px solid #3A3530;border-left:2px solid #6BAF87;border-radius:8px;padding:14px;font-size:12px;color:#6BAF87;">
           ✅ API call succeeded — ${text.length} chars returned<br>
           <span style="color:#8A7E6A;margin-top:6px;display:block;">${text.slice(0,120)}…</span>
         </div>`
      : `<div style="color:#E07070;font-size:13px;">❌ API returned empty response</div>`;
  } catch(e) {
    el.innerHTML = `<div style="color:#E07070;font-size:13px;">❌ API error: ${e.message}</div>`;
  }
  btn.textContent = '🌐 Run Live API Test';
  btn.disabled = false;
}
</script>
</body>
</html>
